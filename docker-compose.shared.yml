# agentmemory — shared / remote-hosted deployment
#
# Use this instead of the default docker-compose.yml when you want
# multiple agents (across machines) to share the same memory store.
#
#   1. Copy this file alongside the repo as docker-compose.yml
#   2. Set AGENTMEMORY_SECRET to something strong (openssl rand -hex 32)
#   3. docker compose up -d
#   4. From remote machines, set AGENTMEMORY_URL=http://<remote-ip>:3111
#   5. Open viewer at http://<remote-ip>:3113
#
# Security: this binds all ports to 0.0.0.0. Protect with a firewall
# (ufw/iptables) or reverse-proxy (nginx/caddy) + basic auth.
# The AGENTMEMORY_SECRET env var adds HMAC auth to all REST endpoints.

x-agentmemory-secret: &secret
  AGENTMEMORY_SECRET: ${AGENTMEMORY_SECRET:-change-me-to-a-random-secret}
  AGENTMEMORY_III_VERSION: ${AGENTMEMORY_III_VERSION:-0.11.2}
  # LLM provider keys — pass from host env, leave blank to use no-op provider
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-}
  OPENAI_API_KEY_FOR_LLM: ${OPENAI_API_KEY_FOR_LLM:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
  # Embedding
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
  OPENAI_EMBEDDING_BASE_URL: ${OPENAI_EMBEDDING_BASE_URL:-}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-}
  OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-}
  # Behavior flags
  AGENTMEMORY_AUTO_COMPRESS: ${AGENTMEMORY_AUTO_COMPRESS:-}
  AGENTMEMORY_INJECT_CONTEXT: ${AGENTMEMORY_INJECT_CONTEXT:-}
  CONSOLIDATION_ENABLED: ${CONSOLIDATION_ENABLED:-}
  GRAPH_EXTRACTION_ENABLED: ${GRAPH_EXTRACTION_ENABLED:-}

services:
  # One-shot init container: docker creates named volumes root:root mode
  # 755, but the iii-engine image is distroless and runs as UID 65532
  # with no `chown` of its own. Without this, /data is unwritable, the
  # engine silently buffers in RAM, and state evaporates on every
  # restart.
  iii-init:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - iii-data:/data
    entrypoint: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"
    environment: *secret

  iii-engine:
    image: agentmemory-engine:latest
    user: "65532:65532"
    depends_on:
      iii-init:
        condition: service_completed_successfully
    ports:
      # WebSocket — clients (MCP, viewer, plugins) connect here
      - "0.0.0.0:49134:49134"
      # REST API — memory tools, hooks, status endpoints
      - "0.0.0.0:3111:3111"
      # SSE streams — real-time observation stream
      - "0.0.0.0:3112:3112"
      # Viewer UI — web-based memory viewer
      - "0.0.0.0:3114:3113"
    volumes:
      - iii-data:/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
      - ./dist:/app/dist:ro
    environment: *secret
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  iii-data:
    name: agentmemory-data
